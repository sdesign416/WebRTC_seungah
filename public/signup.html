<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <h2>회원가입</h2>
        <form id="signupForm">
            <div class="roleBox">
                <div class="roleOption">
                    <input type="radio" name="userType" id="teacher" value="teacher">
                    <label for="teacher">선생님</label>
                </div>

                <div class="roleOption">
                    <input type="radio" name="userType" id="student" value="student">
                    <label for="student">학생</label>
                </div>
            </div>
            <div class="inputBox">
                <input type="text" name="userid" id="userid" maxlength="20" placeholder="아이디">
                <input type="button" name="duplBtn" id="duplBtn" value="중복확인" onclick="duplCheck()">
            </div>
            <div class="inputBox">
                <input type="password" name="userpw" id="userpw" maxlength="20" placeholder="비밀번호">
            </div>
            <div class="inputBox">
                <input type="password" name="userpw_re" id="userpw_re" maxlength="20" placeholder="비밀번호 확인">
            </div>
            <div class="inputBox">
                <input type="text" name="nickname" id="nickname" maxlength="20" placeholder="닉네임">
            </div>
            <div class="inputBox">
                <input type="text" name="username" id="username" maxlength="20" placeholder="이름(설명)">
            </div>
            <div class="inputBox">           
                <input type="email" name="email" id="email" maxlength="50" placeholder="이메일">
            </div>

            <button type="submit" class="submitBtn">회원가입</button>

            <div class="linkBox">
                <span>이미 계정이 있으신가요?</span>
                <a href="./login.html">로그인</a>
            </div>
        </form>
    </main>

    <script src="./js/signup.js"></script>
    
</body>
</html>
